function lSet(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
function lGet(k)    { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } }
function lSetS(k,v) { try { localStorage.setItem(k, v); } catch {} }
function lGetS(k)   { try { return localStorage.getItem(k); } catch { return null; } }

function sheetsSync(action, data) {
  if (!SHEETS_URL || SHEETS_URL.includes("PEGA")) return;
  fetch(SHEETS_URL, {
    method: "POST", mode: "no-cors",
    headers: {"Content-Type": "text/plain"},
    body: JSON.stringify({action, data})
  }).catch(() => {});
}

async function sheetsLoad() {
  if (!SHEETS_URL || SHEETS_URL.includes("PEGA")) return null;
  try {
    const res = await fetch(SHEETS_URL + "?action=getAll&t=" + Date.now());
    if (!res.ok) return null;
    const data = await res.json();
    return data?.error ? null : data;
  } catch { return null; }
}

    const reader=new FileReader();
    reader.onload=async()=>{
      const b64=reader.result.split(",")[1],mime=file.type||"image/jpeg";
      setImgPrev(reader.result);setReading(true);
      try{
        const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:60,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:mime,data:b64}},{type:"text",text:"Comprobante de pago bancario ecuatoriano. Responde SOLO con el monto numérico (ejemplo: 25.50). Sin texto, sin símbolo. Si no hay monto: 0"}]}]})});
        const d=await res.json();const raw=d.content?.[0]?.text?.trim()||"0";
        const amt=parseFloat(raw.replace(/[^0-9.]/g,""))||0;
        if(amt>0){setPagoF(f=>({...f,monto:amt.toFixed(2)}));toast_("💡 Monto detectado: $"+amt.toFixed(2));}
        else toast_("No pude leer el monto — ingrésalo tú","warn");
      }catch{toast_("Error leyendo imagen","warn");}
      setReading(false);
    };
    reader.readAsDataURL(file);
  }

                </button>
              </div>
              {form.invId&&<div style={{fontSize:11,color:"#2D6A4F",marginTop:3}}>✓ Se descontará del inventario al registrar</div>}
            </div>
            <div style={{display:"flex",gap:10}}>
              <div style={{...S.fg,flex:1}}><label style={S.lbl}>PRECIO ($)</label><input type="number" style={S.inp} placeholder="0.00" value={form.pvp} inputMode="decimal" onChange={e=>setForm(f=>({...f,pvp:e.target.value}))}/></div>
              <div style={{...S.fg,width:72}}><label style={S.lbl}>CANT.</label><input type="number" style={S.inp} value={form.qty} min="1" inputMode="numeric" onChange={e=>setForm(f=>({...f,qty:e.target.value}))}/></div>
            </div>
            {form.pvp&&parseFloat(form.pvp)>0&&<div style={S.totP}><span style={{opacity:0.6,fontSize:12}}>Total</span><span style={{fontSize:22,fontWeight:800}}>${(parseFloat(form.pvp||0)*(parseInt(form.qty)||1)).toFixed(2)}</span></div>}
            <button onClick={registrarPedido} disabled={!form.cliente.trim()||!form.pvp} style={{...S.btnD,opacity:(!form.cliente.trim()||!form.pvp)?0.4:1}}>Registrar + Etiqueta</button>
          </div>
          {pedidos.filter(p=>p.live===live).length>0&&<div style={S.card}>
            <div style={{...S.cT,display:"flex",justifyContent:"space-between"}}>
              <span>{live}</span><span style={{color:"#C45C26"}}>${pedidos.filter(p=>p.live===live).reduce((s,p)=>s+p.total,0).toFixed(2)}</span>
            </div>
            <div style={{maxHeight:200,overflowY:"auto"}}>
              {[...pedidos.filter(p=>p.live===live)].reverse().map(p=><div key={p.id} style={S.li}><div><div style={S.liN}>{p.cliente}</div><div style={S.liS}>{p.prenda!=="-"?p.prenda:"—"}</div></div><div style={S.liA}>${p.total.toFixed(2)}</div></div>)}
            </div>
          </div>}
        </div>}

        {/* ─── PAGO ─── */}
        {tab==="pago"&&<div style={S.sec}>
          <div style={S.card}>
            <div style={S.cT}>Registrar Pago</div>
            <div style={{marginBottom:14}}>
              <label style={S.lbl}>COMPROBANTE — la IA lee el monto automáticamente</label>
              <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={handleImg}/>
              <button onClick={()=>fileRef.current.click()} style={S.btnComp}>{reading?"⏳ Leyendo monto...":imgPrev?"📎 Comprobante cargado — toca para cambiar":"📷 Subir foto del comprobante"}</button>
              {imgPrev&&!reading&&<div style={{marginTop:8,borderRadius:12,overflow:"hidden",border:"2px solid #EDE0D7",maxHeight:130}}><img src={imgPrev} style={{width:"100%",objectFit:"cover"}} alt="comp"/></div>}
              {reading&&<div style={{textAlign:"center",padding:14,color:"#C45C26",fontSize:13,background:"#FFF3EC",borderRadius:12,marginTop:8}}>🤖 Leyendo monto del comprobante...</div>}
            </div>
            <div style={S.fg}>
              <label style={S.lbl}>CLIENTE</label>
              <input style={S.inp} placeholder="Alias del cliente" value={pagoF.cliente} autoCapitalize="characters"
                onChange={e=>{setPagoF(f=>({...f,cliente:e.target.value}));setShowPS(true);}} onFocus={()=>setShowPS(true)}/>
              {showPS&&sugP.length>0&&<div style={S.sug}>{sugP.map(a=>{const b=balance(a);return(
                <button key={a} style={S.sugI} onClick={()=>{setPagoF(f=>({...f,cliente:a}));setShowPS(false);}}>
                  <span style={{fontWeight:700}}>{a}</span>
                  {b.saldo>0&&<span style={{float:"right",color:"#C45C26",fontWeight:700,fontSize:12}}>debe ${b.saldo.toFixed(2)}</span>}
                </button>);})}
              </div>}
            </div>
            {pagoF.cliente.trim().length>1&&(()=>{const b=balance(pagoF.cliente.trim().toUpperCase());return b.tc>0?(<div style={{background:"#FFF3EC",borderRadius:10,padding:"10px 14px",marginBottom:12}}><div style={{display:"flex",justifyContent:"space-between",fontSize:13}}><span style={{color:"#888"}}>Compró: <b style={{color:"#333"}}>${b.tc.toFixed(2)}</b></span><span style={{color:"#888"}}>Abonó: <b style={{color:"#2D6A4F"}}>${b.ta.toFixed(2)}</b></span></div><div style={{color:"#C45C26",fontWeight:800,fontSize:16,marginTop:4}}>Saldo: ${b.saldo.toFixed(2)}</div></div>):null;})()}
            <div style={S.fg}><label style={S.lbl}>MONTO ($)</label><input type="number" style={{...S.inp,background:pagoF.monto?"#F0FFF6":"#FDFAF8",borderColor:pagoF.monto?"#A8D5B5":"#EDE0D7"}} placeholder="0.00" value={pagoF.monto} inputMode="decimal" onChange={e=>setPagoF(f=>({...f,monto:e.target.value}))}/></div>
            <div style={S.fg}><label style={S.lbl}>NOTA (opcional)</label><input style={S.inp} placeholder="Ej: abono semana anterior" value={pagoF.nota} onChange={e=>setPagoF(f=>({...f,nota:e.target.value}))}/></div>
            <button onClick={registrarPago} disabled={!pagoF.cliente.trim()||!pagoF.monto} style={{...S.btnGreen,opacity:(!pagoF.cliente.trim()||!pagoF.monto)?0.4:1}}>Registrar Pago</button>
          </div>
          {abonos.length>0&&<div style={S.card}><div style={S.cT}>Últimos pagos</div><div style={{maxHeight:200,overflowY:"auto"}}>{[...abonos].reverse().slice(0,20).map(a=><div key={a.id} style={S.li}><div><div style={S.liN}>{a.cliente}</div><div style={S.liS}>{a.fecha}{a.nota?" · "+a.nota:""}{a.conComp?" 📎":""}</div></div><div style={{...S.liA,color:"#2D6A4F"}}>+${a.monto.toFixed(2)}</div></div>)}</div></div>}
        </div>}

        {/* ─── INVENTARIO ─── */}
        {tab==="inventario"&&<div style={S.sec}>
          {/* KPIs */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
            {[
              ["Productos",inventario.length,"registrados"],
              ["En stock",inventario.reduce((s,i)=>s+qtyR(i),0),"unidades"],
              ["Valor","$"+inventario.reduce((s,i)=>s+i.precio*qtyR(i),0).toFixed(0),"total"],
            ].map(([t,v,s])=>(
              <div key={t} style={{background:"#fff",borderRadius:14,padding:"12px 10px",boxShadow:"0 2px 10px rgba(0,0,0,0.05)",textAlign:"center"}}>
                <div style={{fontSize:9,color:"#AAA",letterSpacing:1,textTransform:"uppercase"}}>{t}</div>
                <div style={{fontSize:20,fontWeight:900,color:"#1A1A1A",marginTop:2}}>{v}</div>
                <div style={{fontSize:9,color:"#AAA",marginTop:1}}>{s}</div>
              </div>
            ))}
          </div>

          {/* Barra de acciones */}
          <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center"}}>
            <input style={{...S.inp,flex:1,marginBottom:0,fontSize:13}} placeholder="🔍  Buscar por nombre, categoría o talla..." value={searchInv} onChange={e=>setSearchInv(e.target.value)}/>
          </div>
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            <button onClick={()=>abrirInv()} style={{...S.btnD,flex:1,padding:"12px",fontSize:13}}>+ Nueva entrada</button>
            <button onClick={generarPDF} disabled={inventario.length===0} style={{...S.btnD,flex:1,padding:"12px",fontSize:13,background:inventario.length===0?"#CCC":"#C45C26"}}>📄 Exportar PDF</button>
          </div>

          {invFiltrado.length===0?(
            <div style={{textAlign:"center",padding:"36px 0",color:"#bbb"}}>
              <div style={{fontSize:32,marginBottom:8}}>📦</div>
              <div style={{fontSize:14,marginBottom:16}}>{searchInv?"Sin resultados para esa búsqueda":"Sin mercadería registrada"}</div>
              {!searchInv&&<button onClick={()=>abrirInv()} style={{...S.btnD,width:"auto",padding:"12px 24px"}}>+ Registrar primera entrada</button>}
            </div>
          ):(
            <div style={S.card}>
              {invFiltrado.map((item,idx,arr)=>{
                const rest=qtyR(item),vendido=item.qty-rest,pct=item.qty>0?Math.round((vendido/item.qty)*100):0;
                return(
                  <div key={item.id} style={{...S.li,borderBottom:idx<arr.length-1?"1px solid #F5EDE4":"none",alignItems:"flex-start",paddingTop:13,paddingBottom:13}}>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                        <div style={{fontSize:14,fontWeight:800,color:"#1A1A1A"}}>{item.descripcion}</div>
                        {item.talla&&<span style={{background:"#FFF3EC",color:"#C45C26",borderRadius:5,padding:"1px 7px",fontSize:11,fontWeight:700}}>{item.talla}</span>}
                        <span style={{background:rest<=0?"#FFE4E4":rest<=3?"#FFF0D4":"#E6F4EC",color:rest<=0?"#D00":rest<=3?"#B7570A":"#2D6A4F",borderRadius:5,padding:"1px 7px",fontSize:10,fontWeight:600}}>{rest<=0?"Agotado":`${rest} disp.`}</span>
                      </div>
                      <div style={{fontSize:11,color:"#AAA",marginTop:2}}>{item.categoria}{item.importacion?" · "+item.importacion:""}</div>
                      <div style={{marginTop:6,background:"#F5EDE4",borderRadius:6,height:4,overflow:"hidden"}}>
                        <div style={{height:"100%",background:pct>=90?"#D00":pct>=60?"#C45C26":"#2D6A4F",width:pct+"%"}}/>
                      </div>
                      <div style={{fontSize:10,color:"#AAA",marginTop:2}}>{vendido} vendido / {item.qty} total</div>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0,marginLeft:10}}>
                      <div style={{fontWeight:800,color:"#C45C26",fontSize:15}}>${item.precio.toFixed(2)}</div>
                      <div style={{fontSize:10,color:"#AAA",marginTop:1}}>Stock: <b style={{color:"#1A1A1A"}}>${(item.precio*rest).toFixed(2)}</b></div>
                      <button onClick={()=>abrirInv(item)} style={{background:"#F5EDE4",border:"none",borderRadius:8,padding:"5px 10px",fontSize:11,color:"#888",cursor:"pointer",marginTop:5}}>✏️</button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>}

        {/* ─── CLIENTES ─── */}
        {tab==="clientes"&&<div style={S.sec}>
          <div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center"}}>
            <input style={{...S.inp,flex:1,marginBottom:0}} placeholder="🔍 Alias, nombre, TikTok..." value={searchCli} onChange={e=>setSearchCli(e.target.value)}/>
            <button onClick={()=>abrirCliente()} style={{...S.btnD,width:"auto",padding:"12px 14px",fontSize:13,flexShrink:0}}>+ Nuevo</button>
          </div>
          {clientes.filter(c=>!searchCli||c.alias.includes(searchCli.toUpperCase())||c.nombre.toLowerCase().includes(searchCli.toLowerCase())||(c.tiktok||"").toLowerCase().includes(searchCli.toLowerCase())).length===0?(
            <div style={{textAlign:"center",padding:"40px 0",color:"#bbb"}}><div style={{fontSize:32,marginBottom:8}}>👥</div><div style={{fontSize:14}}>Sin clientes registrados</div></div>
          ):(
            <div style={S.card}>
              {clientes.filter(c=>!searchCli||c.alias.includes(searchCli.toUpperCase())||c.nombre.toLowerCase().includes(searchCli.toLowerCase())||(c.tiktok||"").toLowerCase().includes(searchCli.toLowerCase())).map((c,i,arr)=>{
                const b=balance(c.alias);
                return(<div key={c.id} style={{...S.li,borderBottom:i<arr.length-1?"1px solid #F5EDE4":"none",alignItems:"flex-start",paddingTop:13,paddingBottom:13}}>
                  <div style={{flex:1,cursor:"pointer"}} onClick={()=>setShowPerfilModal({alias:c.alias,perfil:c})}>
                    <div style={{fontSize:15,fontWeight:800,color:"#1A1A1A"}}>{c.alias}</div>
                    <div style={{fontSize:12,color:"#888",marginTop:1}}>{c.nombre}</div>
                    <div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap"}}>
                      {c.tiktok&&<span style={S.chip}>🎵 {c.tiktok}</span>}
                      {c.telefono&&<span style={S.chip}>📞 {c.telefono}</span>}
                      {b.saldo>0&&<span style={{...S.chip,background:"#FFF0E8",color:"#C45C26"}}>debe ${b.saldo.toFixed(2)}</span>}
                    </div>
                  </div>
                  <button onClick={()=>abrirCliente(c)} style={{background:"#F5EDE4",border:"none",borderRadius:8,padding:"6px 10px",fontSize:12,color:"#888",cursor:"pointer",flexShrink:0,marginLeft:8}}>✏️</button>
                </div>);
              })}
            </div>
          )}
        </div>}

        {/* ─── SALDOS ─── */}
        {tab==="saldos"&&<div style={S.sec}>
          <div style={S.summCard}>
            <div style={{fontSize:11,opacity:0.6,letterSpacing:2,textTransform:"uppercase"}}>Total por cobrar</div>
            <div style={{fontSize:36,fontWeight:900,letterSpacing:-1,marginTop:4}}>${clientesConSaldo.reduce((s,c)=>s+c.saldo,0).toFixed(2)}</div>
            <div style={{opacity:0.5,fontSize:12,marginTop:4}}>{clientesConSaldo.length} clientes con saldo</div>
          </div>
          {clientesConSaldo.length===0?<div style={{textAlign:"center",padding:"30px 0",color:"#aaa",fontSize:14}}>🎉 Sin saldos pendientes</div>:(
            <div style={S.card}>
              {clientesConSaldo.map((c,i)=>(
                <div key={c.alias} style={{...S.li,borderBottom:i<clientesConSaldo.length-1?"1px solid #F5EDE4":"none",alignItems:"flex-start",paddingTop:13,paddingBottom:13,cursor:"pointer"}} onClick={()=>setShowPerfilModal(c)}>
                  <div style={{flex:1}}><div style={{fontSize:14,fontWeight:800,color:"#1A1A1A"}}>{c.alias}</div>
                    {c.p&&<div style={{fontSize:11,color:"#AAA",marginTop:1}}>{c.p.nombre}</div>}
                    <div style={{display:"flex",gap:10,marginTop:4,fontSize:11,color:"#AAA"}}><span>Compró <b style={{color:"#555"}}>${c.tc.toFixed(2)}</b></span><span>Abonó <b style={{color:"#2D6A4F"}}>${c.ta.toFixed(2)}</b></span></div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{color:"#C45C26",fontWeight:800,fontSize:17}}>${c.saldo.toFixed(2)}</div>
                    <div style={{fontSize:10,marginTop:3,color:c.ta>=10?"#2D6A4F":"#E07040"}}>{c.ta>=10?"✓ con abono":"sin abono"}</div>
                    {c.p&&<div style={{fontSize:10,color:"#C45C26",marginTop:2}}>ver datos envío ›</div>}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>}

      </div>

      {/* BOTTOM NAV */}
      <div style={S.bnav}>
        {[{id:"pedido",icon:"🛍",l:"Pedido"},{id:"pago",icon:"💵",l:"Pago"},{id:"inventario",icon:"📦",l:"Stock"},{id:"clientes",icon:"👥",l:"Clientes"},{id:"saldos",icon:"📋",l:"Saldos"}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{...S.navI,color:tab===t.id?"#C45C26":"#CCC"}}>
            <span style={{fontSize:18}}>{t.icon}</span>
            <span style={{fontSize:9,fontWeight:tab===t.id?700:400,marginTop:1}}>{t.l}</span>
            {tab===t.id&&<div style={S.navDot}/>}
          </button>
        ))}
      </div>
    </div>
  );
}

const st={
  root:{maxWidth:390,margin:"0 auto",minHeight:"100vh",background:"#FDF6F0",display:"flex",flexDirection:"column",fontFamily:"Georgia,serif",position:"relative"},
  toast:{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",color:"#fff",borderRadius:20,padding:"10px 22px",fontSize:13,fontWeight:600,zIndex:1000,whiteSpace:"nowrap",boxShadow:"0 4px 20px rgba(0,0,0,0.2)"},
  hdr:{background:"#1A1A1A",color:"#fff",padding:"12px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0},
  hdrSub:{fontSize:9,letterSpacing:3,color:"#C45C26",marginBottom:1},
  hdrTitle:{fontSize:22,fontWeight:900,letterSpacing:-0.5},
  liveBadge:{background:"#2A2A2A",border:"1px solid #3A3A3A",color:"#fff",borderRadius:10,padding:"6px 12px",cursor:"pointer",textAlign:"center",maxWidth:130},
  content:{flex:1,overflowY:"auto",paddingBottom:74},
  sec:{padding:"14px 14px 0"},
  card:{background:"#fff",borderRadius:18,padding:"16px 14px",marginBottom:12,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"},
  cT:{fontSize:12,fontWeight:700,letterSpacing:1,color:"#1A1A1A",marginBottom:12,textTransform:"uppercase"},
  fg:{marginBottom:10,position:"relative"},
  lbl:{fontSize:10,letterSpacing:1.5,color:"#AAA",fontFamily:"system-ui,sans-serif",display:"block",marginBottom:4,fontWeight:600},
  inp:{width:"100%",border:"1.5px solid #EDE0D7",borderRadius:12,padding:"11px 13px",fontSize:15,background:"#FDFAF8",color:"#1A1A1A",outline:"none",boxSizing:"border-box",fontFamily:"system-ui,sans-serif"},
  sug:{position:"absolute",top:"100%",left:0,right:0,background:"#fff",border:"1.5px solid #EDE0D7",borderRadius:12,zIndex:20,boxShadow:"0 8px 24px rgba(0,0,0,0.12)",overflow:"hidden"},
  sugI:{width:"100%",textAlign:"left",padding:"11px 14px",background:"transparent",border:"none",borderBottom:"1px solid #F5EDE4",fontSize:13,color:"#333",cursor:"pointer",fontFamily:"system-ui,sans-serif",display:"block"},
  totP:{background:"#FFF3EC",borderRadius:12,padding:"11px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,color:"#C45C26",fontFamily:"system-ui,sans-serif"},
  btnD:{width:"100%",background:"#1A1A1A",color:"#fff",border:"none",borderRadius:14,padding:"14px",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"Georgia,serif"},
  btnGreen:{width:"100%",background:"#2D6A4F",color:"#fff",border:"none",borderRadius:14,padding:"14px",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"Georgia,serif"},
  btnComp:{width:"100%",background:"#F5EDE4",color:"#C45C26",border:"2px dashed #C45C26",borderRadius:12,padding:12,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"system-ui,sans-serif",textAlign:"center"},
  li:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #F5EDE4"},
  liN:{fontSize:14,fontWeight:700,color:"#1A1A1A",fontFamily:"system-ui,sans-serif"},
  liS:{fontSize:11,color:"#AAA",marginTop:2,fontFamily:"system-ui,sans-serif"},
  liA:{fontSize:15,fontWeight:800,color:"#C45C26",fontFamily:"system-ui,sans-serif"},
  chip:{background:"#F5EDE4",color:"#888",borderRadius:6,padding:"2px 7px",fontSize:10,fontFamily:"system-ui,sans-serif"},
  summCard:{background:"#1A1A1A",color:"#fff",borderRadius:18,padding:18,marginBottom:12,fontFamily:"system-ui,sans-serif"},
  ov:{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:200},
  sh:{background:"#fff",borderRadius:"20px 20px 0 0",padding:"22px 18px 34px",width:"100%",maxWidth:390},
  shT:{fontSize:15,fontWeight:800,marginBottom:14,textAlign:"center",letterSpacing:0.5},
  liveBtn:{background:"#F5EDE4",border:"none",borderRadius:12,padding:11,fontSize:13,fontWeight:700,cursor:"pointer",color:"#555",fontFamily:"system-ui,sans-serif"},
  liveBtnOn:{background:"#1A1A1A",color:"#fff"},
  cancelBtn:{display:"block",width:"100%",background:"transparent",border:"none",color:"#AAA",fontSize:14,cursor:"pointer",padding:10,fontFamily:"system-ui,sans-serif",textAlign:"center"},
  labelCard:{border:"2px dashed #C45C26",borderRadius:16,padding:"18px 14px",textAlign:"center",background:"#FFF8F4",marginBottom:12},
  bnav:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:390,background:"#fff",borderTop:"1px solid #F0E6DE",display:"flex",zIndex:100},
  navI:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",padding:"9px 0 7px",background:"transparent",border:"none",cursor:"pointer",fontFamily:"system-ui,sans-serif"},
  navDot:{width:4,height:4,borderRadius:"50%",background:"#C45C26",marginTop:2},
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
