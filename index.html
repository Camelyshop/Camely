  function similaridad(a, b) {
    const norm = s => s.toUpperCase().normalize("NFD").replace(/[̀-ͯ]/g, "").replace(/[^A-Z0-9]/g, " ").trim();
    const wa = norm(a).split(" ").filter(w => w.length > 1);
    const wb = norm(b).split(" ").filter(w => w.length > 1);
    if (!wa.length || !wb.length) return 0;
    const matches = wa.filter(w => wb.some(v => v === w || v.startsWith(w) || w.startsWith(v)));
    return matches.length / Math.max(wa.length, wb.length);
  }
  function detectarDuplicados() {
    const pares = [];
    const vistos = new Set();
    clientes.forEach((a, i) => {
      clientes.slice(i + 1).forEach(b => {
        const key = [a.alias || a.id, b.alias || b.id].sort().join("|||");
        if (vistos.has(key)) return;
        const score = similaridad(a.alias || a.nombre || "", b.alias || b.nombre || "");
        if (score >= 0.5) {
          vistos.add(key);
          pares.push({
            a,
            b,
            score
          });
        }
      });
    });
    return pares.sort((x, y) => y.score - x.score);
  }

  function fmtFecha(f) {

      if (/^\d{1,2}-[A-Za-z]{3}-\d{4}$/.test(String(f))) return String(f);
      if (/^\d{4}-\d{2}-\d{2}/.test(String(f))) {
        const p = String(f).split("T")[0].split("-");
        return parseInt(p[2]) + "-" + MESES_ABR[parseInt(p[1]) - 1] + "-" + p[0];
      }

      if (isNaN(d.getTime())) return String(f);

      return String(f || "");
    }
  }

    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async () => {
      const b64 = reader.result.split(",")[1],
        mime = file.type || "image/jpeg";
      setImgPrev(reader.result);
      setReading(true);
      try {
        const apiKey = localStorage.getItem("camely_ak") || "";
        if (!apiKey) {
          toast_("⚠ Ingresa tu API Key de Gemini en Configuración", "warn");
          setReading(false);
          return;
        }
        const res = await fetch(GEMINI_URL + apiKey, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            contents: [{
              parts: [{
                inline_data: {
                  mime_type: mime,
                  data: b64
                }
              }, {
                text: "Comprobante de pago bancario ecuatoriano. Responde SOLO con el monto numérico (ejemplo: 25.50). Sin texto, sin símbolo. Si no hay monto: 0"
              }]
            }]
          })
        });
        const d = await res.json();
        const raw = (d.candidates?.[0]?.content?.parts?.[0]?.text || "0").trim();
        const amt = parseFloat(raw.replace(/[^0-9.]/g, "")) || 0;
        if (amt > 0) {
          setPagoF(f => ({
            ...f,
            monto: amt.toFixed(2)
          }));
          toast_("💡 Monto detectado: $" + amt.toFixed(2));
        } else toast_("No pude leer el monto — ingrésalo tú", "warn");
      } catch {
        toast_("Error leyendo imagen", "warn");
      }
      setReading(false);
    };
    reader.readAsDataURL(file);
  }

  function generarCodigosInventario(imp, itemsLlegada) {
    const getCod = i => i.codigo || i.id || "";
    const existing = inventario.filter(i => getCod(i).toString().toUpperCase().startsWith("C-"));
    let maxNum = 0;
    existing.forEach(i => {
      const n = parseInt(getCod(i).toString().replace(/^C-0*/i, "")) || 0;
      if (n > maxNum) maxNum = n;
    });
    const existingCodes = new Set(inventario.map(i => getCod(i).toString().toUpperCase()).filter(Boolean));
    const nuevos = [];
    let counter = maxNum;
    const items = itemsLlegada && itemsLlegada.length > 0 ? itemsLlegada : imp.items && imp.items.length > 0 ? imp.items : [];
    if (items.length > 0) {
      items.forEach(item => {
        const cant = parseInt(item.cantidad) || 1;
        for (let i = 0; i < cant; i++) {
          counter++;
          let codigo = "C-" + String(counter).padStart(4, "0");
          while (existingCodes.has(codigo.toUpperCase())) {
            counter++;
            codigo = "C-" + String(counter).padStart(4, "0");
          }
          existingCodes.add(codigo.toUpperCase());
          nuevos.push({
            id: codigo,
            codigo,
            importacionId: imp.id,
            importacionNombre: imp.nombre,
            fecha: hoy(),
            categoria: item.categoria || "ropa",
            tipoRopa: item.tipoRopa || null,
            talla: item.talla || "",
            descripcion: item.descripcion || (item.categoria === "ropa" ? (item.tipoRopa ? " " + item.tipoRopa : "") + " ropa" : item.categoria) || "Prenda",
            precio: parseFloat(item?.pvp || 0) || parseFloat(imp.costoUnit || 0),
            estado: "disponible",
            pedidoId: null,
            cliente: null,
            qty: 1
          });
        }
      });
    } else {
      for (let i = 0; i < (imp.numPrendas || 1); i++) {
        counter++;
        const codigo = "C-" + String(counter).padStart(4, "0");
        nuevos.push({
          id: codigo,
          codigo,
          importacionId: imp.id,
          importacionNombre: imp.nombre,
          fecha: hoy(),
          categoria: "ropa",
          tipoRopa: null,
          talla: "",
          descripcion: "Prenda",
          precio: parseFloat(item?.pvp || 0) || parseFloat(imp.costoUnit || 0),
          estado: "disponible",
          pedidoId: null,
          cliente: null,
          qty: 1
        });
      }
    }
    return nuevos;
  }
  function buscarPorCodigo(codigo) {
    const raw = codigo.toUpperCase().trim();
    const num = raw.replace(/^C-?0*/, "");
    const variants = ["C-" + num, "C-" + num.padStart(2, "0"), "C-" + num.padStart(3, "0"), "C-" + num.padStart(4, "0"), raw];
    const match = i => {
      const cod = String(i.codigo || i.id || "").toUpperCase();
      return variants.includes(cod);
    };
    const avail = inventario.find(i => match(i) && (!i.estado || i.estado === "disponible"));
    if (avail) return avail;
    const any = inventario.find(i => match(i));
    return any || null;
  }

      if (dm) return dm[2] + "-" + dm[1];
      const dm2 = s.match(/^(\d{1,2})\/(\d{1,2})(?:\/\d+)?$/);

  async function cambiarEstadoImport(impId, nuevoEstado, tarjetaId, fleteM = "", fleteTarjeta = "") {
    const imp = importaciones.find(i => i.id === impId);
    if (!imp) return;
    const upd = importaciones.map(i => i.id === impId ? {
      ...i,
      estado: nuevoEstado,
      ...(nuevoEstado === "pagada" && tarjetaId ? {
        tarjetaId
      } : {})
    } : i);
    setImportaciones(upd);
    lSet(K.imports, upd);
    sheetsSync("saveImports", upd);
    if (nuevoEstado === "pagada") {
      const newCargos = [...cargosTarjeta];
      if (tarjetaId) {
        newCargos.push({
          id: Date.now(),
          fecha: hoy(),
          tarjetaId,
          descripcion: imp.nombre + " (mercadería)",
          monto: imp.costoTotal,
          tipo: "cargo"
        });
      }
      if (fleteM && parseFloat(fleteM) > 0 && fleteTarjeta !== "efectivo") {
        const fTarjId = fleteTarjeta || tarjetaId;
        if (fTarjId) {
          newCargos.push({
            id: Date.now() + 1,
            fecha: hoy(),
            tarjetaId: fTarjId,
            descripcion: imp.nombre + " (flete/traída)",
            monto: parseFloat(fleteM),
            tipo: "cargo"
          });
        }
      }
      if (newCargos.length > cargosTarjeta.length) {
        setCargosTarjeta(newCargos);
        lSet(K.cargos, newCargos);
        sheetsSync("saveCargos", newCargos);
        const totalCargo = (tarjetaId ? imp.costoTotal : 0) + (fleteM && fleteTarjeta !== "efectivo" ? parseFloat(fleteM) : 0);
        toast_("Cargo de $" + totalCargo.toFixed(2) + " registrado en tarjeta ✓");
      }
      setStatusFleteM("");
      setStatusFleteTarjeta("");
    }
    if (nuevoEstado === "recibida") {
      const itemsLlegada = expandedLlegada === impId ? llegadaItems : [];
      const totalPrendasReales = itemsLlegada.length > 0 ? itemsLlegada.reduce((s, i) => s + parseInt(i.cantidad || 1), 0) : imp.numPrendas || 1;
      const costoTotalReal = (imp.costoTotal || 0) + (imp.fleteEstimado || 0);
      const costoUnitReal = costoTotalReal > 0 ? (costoTotalReal / totalPrendasReales).toFixed(2) : imp.costoUnit;
      const updImps = importaciones.map(i => i.id === impId ? {
        ...i,
        costoUnit: costoUnitReal,
        numPrendasReales: totalPrendasReales
      } : i);
      setImportaciones(updImps);
      lSet(K.importaciones, updImps);
      sheetsSync("saveImportaciones", updImps);
      const nuevos = generarCodigosInventario({
        ...imp,
        costoUnit: costoUnitReal,
        ...(itemsLlegada.length ? {
          items: itemsLlegada
        } : {})
      }, itemsLlegada);
      const updInv = [...inventario, ...nuevos];
      setInventario(updInv);
      lSet(K.inventario, updInv);
      sheetsSync("saveInventario", updInv);
      setLabelsToPrint(nuevos);
      setExpandedLlegada(null);
      setLlegadaItems([]);
      toast_("✓ " + nuevos.length + " códigos · Costo unitario: $" + costoUnitReal);
      setTimeout(() => imprimirEtiquetasImportacion(nuevos), 500);
    }
    setShowStatusModal(false);
    setStatusTarjetaId("");
  }
  async function uploadPDFToDrive(base64, mimeType, filename) {
    if (!SHEETS_URL || SHEETS_URL.includes("PEGA")) return null;
    try {
      const res = await fetch(SHEETS_URL, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain"
        },
        body: JSON.stringify({
          action: "savePDF",
          data: {
            base64,
            mimeType,
            filename
          },
          token: SHEETS_TOKEN
        })
      });
      const d = await res.json();
      return d.ok ? d : null;
    } catch (e) {
      return null;

  async function procesarXMLServientrega(files) {
    const nuevosGastos = [];
    const duplicados = [];
    const errores = [];
    for (const file of Array.from(files)) {
      if (!file.name.toLowerCase().endsWith(".xml") && !file.type.includes("xml")) {
        errores.push(file.name + " (no es XML)");
        continue;
      }
      try {
        const text = await file.text();
        const cdataMatch = text.match(/<!\[CDATA\[([\s\S]*?)\]\]>/);
        const xmlContent = cdataMatch ? cdataMatch[1] : text;
        const parser = new DOMParser();
        const doc = parser.parseFromString(xmlContent, "text/xml");
        const impEl = doc.querySelector("infoFactura > importeTotal") || doc.querySelector("importeTotal");
        const fechaEl = doc.querySelector("infoFactura > fechaEmision") || doc.querySelector("fechaEmision");
        const seqEl = doc.querySelector("infoTributaria > secuencial") || doc.querySelector("secuencial");
        const rucEl = doc.querySelector("infoTributaria > ruc") || doc.querySelector("ruc");
        const razonEl = doc.querySelector("infoTributaria > razonSocial") || doc.querySelector("razonSocial");
        const claveEl = doc.querySelector("claveAcceso");
        if (impEl) {
          const v = parseFloat(impEl.textContent.trim());
          if (!isNaN(v) && v > 0) {
            const fechaRaw = (fechaEl?.textContent || "").trim();
            let fecha = fechaRaw;
            if (fechaRaw.includes("/")) {
              const pts = fechaRaw.split("/");
              fecha = pts[2] + "-" + pts[1].padStart(2, "0") + "-" + pts[0].padStart(2, "0");
            } else if (!fecha || !fecha.includes("-")) fecha = hoyISO();
            const seq = (seqEl?.textContent || "").trim().replace(/^0+/, "");
            const ruc = (rucEl?.textContent || "").trim();
            const razon = (razonEl?.textContent || "Servientrega").trim();
            const clave = (claveEl?.textContent || "").trim();
            const desc = razon + " Fact.#" + seq;
            const claveUnica = clave || ruc + "_" + seq;
            const yaExiste = gastos.some(g => clave && g.claveAcceso && g.claveAcceso === clave || ruc && seq && g.ruc && g.ruc === ruc && g.descripcion && g.descripcion.includes("Fact.#" + seq));
            if (yaExiste) {
              duplicados.push(razon + " Fact.#" + seq);
            } else {
              nuevosGastos.push({
                id: Date.now() + nuevosGastos.length,
                tipo: "servientrega",
                descripcion: desc,
                monto: v,
                fecha,
                tarjetaId: "",
                claveAcceso: clave,
                ruc,
                razon
              });
            }
          } else errores.push(file.name);
        } else errores.push(file.name);
      } catch (e) {
        errores.push(file.name);
        console.warn("XML:", e);
      }
    }
    if (duplicados.length > 0 && nuevosGastos.length === 0) {
      toast_("⚠️ " + duplicados.length + " factura(s) ya registrada(s): " + duplicados.join(", "));
      return;
    }
    if (nuevosGastos.length === 0) {
      toast_("No se encontró importeTotal — verifica que sean facturas SRI válidas");
      return;
    }
    if (duplicados.length > 0) {
      toast_("⚠️ Omitidas " + duplicados.length + " duplicadas: " + duplicados.slice(0, 3).join(", ") + (duplicados.length > 3 ? "..." : ""));
      await new Promise(r => setTimeout(r, 2000));
    }
    if (nuevosGastos.length === 1) {
      const g = nuevosGastos[0];
      setGastoForm(f => ({
        ...f,
        tipo: g.tipo,
        monto: g.monto.toFixed(2),
        descripcion: g.descripcion,
        fecha: g.fecha
      }));
      toast_("✓ 1 XML cargado — $" + g.monto.toFixed(2) + " · " + g.fecha + " · revisa y guarda");
    } else {
      const total = nuevosGastos.reduce((s, g) => s + g.monto, 0);
      const upd = [...gastos, ...nuevosGastos];
      setGastos(upd);
      lSet(K.gastos, upd);
      sheetsSync("saveGastos", upd);
      setShowGastoModal(false);
      toast_("✓ " + nuevosGastos.length + " facturas nuevas guardadas — $" + total.toFixed(2));
    }
  }

  function parseFecha(fecha) {
    if (!fecha) return {
      mes: null,
      ano: null
    };
    const s = String(fecha).trim();
    const normMes = raw => raw ? raw.charAt(0).toUpperCase() + raw.slice(1).toLowerCase() : null;
    const m0 = s.match(/^(\d{4})-(\d{2})-(\d{2})T/);
    if (m0) return {
      mes: MESES[parseInt(m0[2]) - 1] || null,
      ano: m0[1]
    };
    const m1 = s.match(/^\d{1,2}-([A-Za-z]{3})-(\d{4})$/);
    if (m1) return {
      mes: normMes(m1[1]),
      ano: m1[2]
    };
    const m2 = s.match(/^\d{1,2}\/(\d{1,2})\/(\d{4})$/);
    if (m2) return {
      mes: MESES[parseInt(m2[1]) - 1] || null,
      ano: m2[2]
    };
    const m3 = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (m3) return {
      mes: MESES[parseInt(m3[2]) - 1] || null,
      ano: m3[1]
    };
    return {
      mes: null,
      ano: null
    };
  }

  }

  async function deduplicarGastos() {
    const vistos = {};
    const aDuplicados = [];
    const aConservar = [];
    gastos.forEach(g => {
      const match = g.descripcion?.match(/Fact\.#(\d+)/);
      const key = g.claveAcceso || (g.ruc && match ? g.ruc + "_" + match[1] : null) || (match ? g.tipo + "_" + match[1] : null);
      if (key) {
        if (vistos[key]) {
          aDuplicados.push(g);
        } else {
          vistos[key] = true;
          aConservar.push(g);
        }
      } else {
        aConservar.push(g);
      }
    });
    if (aDuplicados.length === 0) {
      toast_("✓ No hay facturas duplicadas");
      return;
    }
    if (!window.confirm("Se encontraron " + aDuplicados.length + " factura(s) duplicada(s).\n\nEjemplos: " + aDuplicados.slice(0, 3).map(g => g.descripcion).join(", ") + (aDuplicados.length > 3 ? "..." : "") + ".\n\n¿Eliminar los duplicados y conservar solo la primera copia de cada factura?")) return;

    lSet(K.gastos, aConservar);
    sheetsSync("saveGastos", aConservar);
