    /* ── RESPONSIVE ── */

    @media print {

const { useState, useEffect, useRef, useCallback } = React;

// ─── USUARIOS (contraseñas en SHA-256) ───
const USUARIOS = {
  "stefy": "ea694f8621cae0e9ea4667f3953dfee1d8dc77a7d87a7cb2d89cfa628335b336",
  "edu":   "ffd22a8ffd0489b9f5e3377c736df2cc109af5d7fb897c6249f6ece5bb16bd14",
  "admin": "4a42a955a312e0181647ee8341786aec7f1a3309c8bc99ef48aaffecea191c61",
};

async function sha256(text) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

function getSesion() { return sessionStorage.getItem("camely_user"); }
function setSesion(u) { sessionStorage.setItem("camely_user", u); }
function cerrarSesion() { sessionStorage.removeItem("camely_user"); window.location.reload(); }

function LoginScreen({ onLogin }) {
  const [user, setUser] = React.useState("");
  const [pass, setPass] = React.useState("");
  const [error, setError] = React.useState("");
  const [loading, setLoading] = React.useState(false);

  async function handleLogin(e) {
    e.preventDefault();
    if (!user.trim() || !pass) return;
    setLoading(true); setError("");
    const hash = await sha256(pass);
    const key  = user.trim().toLowerCase();
    if (USUARIOS[key] && USUARIOS[key] === hash) {
      setSesion(user.trim());
      onLogin(user.trim());
    } else {
      setError("Usuario o contraseña incorrectos");
    }
    setLoading(false);

const SHEETS_URL = "https://script.google.com/macros/s/AKfycbweDlQ47XST6YezmFLu3E5ihs_GyurM6Q2Tm7JSa465h0n6fLIYYVhCU236TSCMehVg/exec";

// ─── STORAGE: localStorage (instantáneo) + Google Sheets (sync) ───
function lSet(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
function lGet(k)    { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } }
function lSetS(k,v) { try { localStorage.setItem(k, v); } catch {} }
function lGetS(k)   { try { return localStorage.getItem(k); } catch { return null; } }

function sheetsSync(action, data) {
  if (!SHEETS_URL || SHEETS_URL.includes("PEGA")) return;
  fetch(SHEETS_URL, {
    method: "POST", mode: "no-cors",
    headers: {"Content-Type": "text/plain"},
    body: JSON.stringify({action, data})
  }).catch(() => {});
}

async function sheetsLoad() {
  if (!SHEETS_URL || SHEETS_URL.includes("PEGA")) return null;
  try {
    const res = await fetch(SHEETS_URL + "?action=getAll&t=" + Date.now());
    if (!res.ok) return null;
    const data = await res.json();
    return data?.error ? null : data;
  } catch { return null; }
}

  // ── Generar códigos de inventario ──
  function generarCodigosInventario(imp, itemsLlegada){
    const existing=inventario.filter(i=>i.codigo?.startsWith("C-"));
    let maxNum=0;
    existing.forEach(i=>{const n=parseInt(i.codigo?.replace("C-",""))||0;if(n>maxNum)maxNum=n;});
    const nuevos=[];
    let counter=maxNum;
    const items=itemsLlegada&&itemsLlegada.length>0?itemsLlegada:(imp.items&&imp.items.length>0?imp.items:[]);
    if(items.length>0){
      items.forEach(item=>{
        const cant=parseInt(item.cantidad)||1;
        for(let i=0;i<cant;i++){
          counter++;
          const codigo="C-"+String(counter).padStart(4,"0");
          nuevos.push({id:codigo,codigo,importacionId:imp.id,importacionNombre:imp.nombre,
            fecha:hoy(),categoria:item.categoria||"ropa",tipoRopa:item.tipoRopa||null,
            talla:item.talla||"",descripcion:item.descripcion||(item.categoria==="ropa"?(item.tipoRopa?" "+item.tipoRopa:"")+" ropa":item.categoria)||"Prenda",
            precio:0,estado:"disponible",pedidoId:null,cliente:null,qty:1});
        }
      });
    } else {
      for(let i=0;i<(imp.numPrendas||1);i++){
        counter++;
        const codigo="C-"+String(counter).padStart(4,"0");
        nuevos.push({id:codigo,codigo,importacionId:imp.id,importacionNombre:imp.nombre,
          fecha:hoy(),categoria:"ropa",tipoRopa:null,talla:"",descripcion:"Prenda",
          precio:0,estado:"disponible",pedidoId:null,cliente:null,qty:1});
      }
    }
    return nuevos;
  }

  async function procesarXMLServientrega(files){
    const nuevosGastos=[];
    const duplicados=[];
    const errores=[];
    for(const file of Array.from(files)){
      // Skip non-XML files (in case user picks wrong file)
      if(!file.name.toLowerCase().endsWith(".xml")&&!file.type.includes("xml")){
        errores.push(file.name+" (no es XML)"); continue;
      }
      try{
        const text=await file.text();
        const cdataMatch=text.match(/<!\[CDATA\[([\s\S]*?)\]\]>/);
        const xmlContent=cdataMatch?cdataMatch[1]:text;
        const parser=new DOMParser();
        const doc=parser.parseFromString(xmlContent,"text/xml");
        const impEl=doc.querySelector("infoFactura > importeTotal")||doc.querySelector("importeTotal");
        const fechaEl=doc.querySelector("infoFactura > fechaEmision")||doc.querySelector("fechaEmision");
        const seqEl=doc.querySelector("infoTributaria > secuencial")||doc.querySelector("secuencial");
        const rucEl=doc.querySelector("infoTributaria > ruc")||doc.querySelector("ruc");
        const razonEl=doc.querySelector("infoTributaria > razonSocial")||doc.querySelector("razonSocial");
        const claveEl=doc.querySelector("claveAcceso");
        if(impEl){
          const v=parseFloat(impEl.textContent.trim());
          if(!isNaN(v)&&v>0){
            const fechaRaw=(fechaEl?.textContent||"").trim();
            let fecha=fechaRaw;
            if(fechaRaw.includes("/")){
              // DD/MM/YYYY → YYYY-MM-DD
              const pts=fechaRaw.split("/");
              fecha=pts[2]+"-"+pts[1].padStart(2,"0")+"-"+pts[0].padStart(2,"0");
            } else if(!fecha||!fecha.includes("-")) fecha=hoyISO();
            const seq=(seqEl?.textContent||"").trim().replace(/^0+/,"");
            const ruc=(rucEl?.textContent||"").trim();
            const razon=(razonEl?.textContent||"Servientrega").trim();
            const clave=(claveEl?.textContent||"").trim();
            const desc=razon+" Fact.#"+seq;
            // Clave única: RUC + número de factura (único por emisor)
            // O clave de acceso SRI si está disponible (más confiable)
            const claveUnica=clave||(ruc+"_"+seq);
            const yaExiste=gastos.some(g=>
              (clave&&g.claveAcceso&&g.claveAcceso===clave)||
              (ruc&&seq&&g.ruc&&g.ruc===ruc&&g.descripcion&&g.descripcion.includes("Fact.#"+seq))
            );
            if(yaExiste){
              duplicados.push(razon+" Fact.#"+seq);
            } else {
              nuevosGastos.push({id:Date.now()+nuevosGastos.length,tipo:"servientrega",
                descripcion:desc,monto:v,fecha,tarjetaId:"",claveAcceso:clave,ruc,razon});
            }
          } else errores.push(file.name);
        } else errores.push(file.name);
      }catch(e){errores.push(file.name);console.warn("XML:",e);}
    }
    // Mostrar resumen
    if(duplicados.length>0&&nuevosGastos.length===0){
      toast_("⚠️ "+duplicados.length+" factura(s) ya registrada(s): "+duplicados.join(", "));
      return;
    }
    if(nuevosGastos.length===0){
      toast_("No se encontró importeTotal — verifica que sean facturas SRI válidas");
      return;
    }
    // Avisar de duplicados si los hay junto con nuevas
    if(duplicados.length>0){
      toast_("⚠️ Omitidas "+duplicados.length+" duplicadas: "+duplicados.slice(0,3).join(", ")+(duplicados.length>3?"...":""));
      await new Promise(r=>setTimeout(r,2000));
    }
    if(nuevosGastos.length===1){
      const g=nuevosGastos[0];
      setGastoForm(f=>({...f,tipo:g.tipo,monto:g.monto.toFixed(2),descripcion:g.descripcion,fecha:g.fecha}));
      toast_("✓ 1 XML cargado — $"+g.monto.toFixed(2)+" · "+g.fecha+" · revisa y guarda");
    } else {
      const total=nuevosGastos.reduce((s,g)=>s+g.monto,0);
      const upd=[...gastos,...nuevosGastos];
      setGastos(upd); lSet(K.gastos,upd); sheetsSync("saveGastos",upd);
      setShowGastoModal(false);
      toast_("✓ "+nuevosGastos.length+" facturas nuevas guardadas — $"+total.toFixed(2));
    }
  }

  // ── Resumen period filter helper ──
  // Parses DD-Mon-YYYY, DD/MM/YYYY, YYYY-MM-DD
  function parseFecha(fecha){
    if(!fecha) return {mes:null,ano:null};
    const s=String(fecha).trim();
    // ISO datetime: 2026-04-28T05:00:00.000Z o 2026-04-28T05:00:00Z
    const m0=s.match(/^(\d{4})-(\d{2})-(\d{2})T/);
    if(m0) return {mes:MESES[parseInt(m0[2])-1]||null,ano:m0[1]};
    // DD-Mon-YYYY: 28-Abr-2026
    const m1=s.match(/^\d{1,2}-([A-Za-z]{3})-(\d{4})$/);
    if(m1) return {mes:m1[1],ano:m1[2]};
    // DD/MM/YYYY: 28/04/2026
    const m2=s.match(/^\d{1,2}\/(\d{1,2})\/(\d{4})$/);
    if(m2) return {mes:MESES[parseInt(m2[1])-1]||null,ano:m2[2]};
    // YYYY-MM-DD: 2026-04-28
    const m3=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if(m3) return {mes:MESES[parseInt(m3[2])-1]||null,ano:m3[1]};
    return {mes:null,ano:null};
  }
  function filtroPeriodo(items){
    if(resMes==="todos"&&resAno==="todos") return items;
    return items.filter(p=>{
      const {mes,ano}=parseFecha(p.fecha);
      const mesOK=resMes==="todos"||mes===resMes;
      const anoOK=resAno==="todos"||ano===resAno;
      return mesOK&&anoOK;
    });
  }

  async function deduplicarGastos(){
    // Agrupa por número de factura (Fact.#XXXX) y conserva solo el primero
    const vistos={};
    const aDuplicados=[];
    const aConservar=[];
    gastos.forEach(g=>{
      const match=g.descripcion?.match(/Fact\.#(\d+)/);
      // Clave única: clave de acceso SRI > RUC+Fact# > tipo+Fact# (fallback)
      const key=g.claveAcceso||(g.ruc&&match?g.ruc+"_"+match[1]:null)||(match?g.tipo+"_"+match[1]:null);
      if(key){
        if(vistos[key]){aDuplicados.push(g);}
        else{vistos[key]=true;aConservar.push(g);}
      } else {
        aConservar.push(g);
      }
    });
    if(aDuplicados.length===0){toast_("✓ No hay facturas duplicadas");return;}
    if(!window.confirm("Se encontraron "+aDuplicados.length+" factura(s) duplicada(s).\n\nEjemplos: "+aDuplicados.slice(0,3).map(g=>g.descripcion).join(", ")+(aDuplicados.length>3?"...":"")+".\n\n¿Eliminar los duplicados y conservar solo la primera copia de cada factura?")) return;
    setGastos(aConservar); lSet(K.gastos,aConservar); sheetsSync("saveGastos",aConservar);
    toast_("✓ "+aDuplicados.length+" duplicado(s) eliminado(s) — quedan "+aConservar.length+" gastos");
  }

              const dm=MESES.map(mes=>{
                const ab=abonos.filter(a=>{const p=a.fecha?.split("-");return p&&p[1]===mes&&(resAno==="todos"||p[2]?.startsWith(year));});
                const ped=pedidos.filter(a=>{const p=a.fecha?.split("-");return p&&p[1]===mes&&(resAno==="todos"||p[2]?.startsWith(year));});
                const imps=importaciones.filter(i=>{if(i.estado!=="recibida")return false;const p=i.fecha?.split("-");return p&&p[1]===mes&&(resAno==="todos"||p[2]?.startsWith(year));});
                const gm=gastos.filter(g=>{const p=g.fecha?.split("-");return p&&p[1]===mes&&(resAno==="todos"||p[2]?.startsWith(year));});
                const cobrado=ab.reduce((s,a)=>s+a.monto,0);
                const ventas=ped.reduce((s,p)=>s+p.total,0);
                const costo=imps.reduce((s,i)=>s+i.costoTotal,0);
                const srv=gm.filter(g=>g.tipo==="servientrega").reduce((s,g)=>s+g.monto,0);
                const isd=gm.filter(g=>g.tipo==="isd").reduce((s,g)=>s+g.monto,0);
                const int=gm.filter(g=>g.tipo==="interes").reduce((s,g)=>s+g.monto,0);
                const sum=gm.filter(g=>g.tipo==="suministros").reduce((s,g)=>s+g.monto,0);
                const otr=gm.filter(g=>g.tipo==="otro").reduce((s,g)=>s+g.monto,0);
                const tGastos=srv+isd+int+sum+otr;
                return{mes,cobrado,ventas,costo,srv,isd,int,sum,otr,tGastos,uBruta:cobrado-costo,uNeta:cobrado-costo-tGastos};
              });
              const tot={
                cobrado:dm.reduce((s,d)=>s+d.cobrado,0),ventas:dm.reduce((s,d)=>s+d.ventas,0),
                costo:dm.reduce((s,d)=>s+d.costo,0),srv:dm.reduce((s,d)=>s+d.srv,0),
                isd:dm.reduce((s,d)=>s+d.isd,0),int:dm.reduce((s,d)=>s+d.int,0),
                sum:dm.reduce((s,d)=>s+d.sum,0),otr:dm.reduce((s,d)=>s+d.otr,0),tGastos:dm.reduce((s,d)=>s+d.tGastos,0),
                uBruta:dm.reduce((s,d)=>s+d.uBruta,0),uNeta:dm.reduce((s,d)=>s+d.uNeta,0),
              };
              const fv=v=>v===0?"—":"$"+v.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,",");
              const fc=v=>v===0?"—":v;
              const cell=(v,bold,color)=>(<td style={{padding:"7px 10px",textAlign:"right",fontWeight:bold?"700":"400",color:color||"#333",whiteSpace:"nowrap",fontSize:12}}>{fv(v)}</td>);
              const hdrCell=(label,cyan)=>(<th style={{padding:"7px 10px",textAlign:"right",fontSize:10,fontWeight:700,background:cyan?"#1BB6C8":"#1A1A1A",color:"#fff",whiteSpace:"nowrap",letterSpacing:0.5}}>{label}</th>);
              // ── renderDetail: expandable breakdown per gastos type ──
              const renderDetail=(tipo)=>{
                const tipoIcon={"servientrega":"🚚","isd":"🏦","interes":"💳","suministros":"🖨","otro":"📋"};
                const allG=gastos.filter(g=>{const f=parseFecha(g.fecha);return g.tipo===tipo&&(resAno==="todos"||f.ano===year);});
                if(allG.length===0) return null;
                // Group by month
                const byMes={};
                MESES.forEach(m=>{const items=allG.filter(g=>parseFecha(g.fecha).mes===m);if(items.length>0)byMes[m]=items;});
                return(<tr style={{background:"#F0FBFD"}}>
                  <td colSpan={14} style={{padding:0}}>
                    <div style={{padding:"8px 16px 12px 16px",overflowX:"auto"}}>
                      {Object.entries(byMes).map(([mes,items])=>(
                        <div key={mes} style={{marginBottom:8}}>
                          <div style={{fontSize:10,fontWeight:700,color:"#1BB6C8",letterSpacing:1,textTransform:"uppercase",marginBottom:4,borderBottom:"1px solid #D0F2F6",paddingBottom:2}}>{mes} — ${items.reduce((s,g)=>s+g.monto,0).toFixed(2)}</div>
                          {items.map(g=>(
                            <div key={g.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:11,padding:"3px 0 3px 8px",color:"#555"}}>
                              <span style={{flex:1}}>{tipoIcon[g.tipo]||"📋"} {g.descripcion||g.tipo}</span>
                              <span style={{fontWeight:700,color:"#1BB6C8",marginRight:6}}>${g.monto.toFixed(2)}</span>
                              {canAdmin&&<button onClick={()=>eliminarGasto(g.id)} style={{background:"#FFE4E4",color:"#D00",border:"none",borderRadius:4,padding:"1px 5px",fontSize:10,cursor:"pointer"}}>✕</button>}
                            </div>
                          ))}
                        </div>
                      ))}
                    </div>
                  </td>
                </tr>);
              };
              const rows=[
                {label:"💵 Cobrado (Ingresos)",key:"cobrado",bold:true,color:"#1BB6C8"},
                {label:"🛍 Ventas (pedidos)",key:"ventas",bold:false,color:"#888"},
                null,
                {label:"🚢 (-) Costo de Venta",key:"costo",bold:true,color:"#B7570A"},
                null,
                {label:"= Utilidad Bruta",key:"uBruta",bold:true,isUtil:true},
                null,
                {label:"🚚 Servientrega",key:"srv",tipo:"servientrega",clickable:true,bold:false,color:"#555"},
                {label:"🏦 ISD",key:"isd",tipo:"isd",clickable:true,bold:false,color:"#555"},
                {label:"💳 Intereses",key:"int",tipo:"interes",clickable:true,bold:false,color:"#555"},
                {label:"🖨 Suministros",key:"sum",tipo:"suministros",clickable:true,bold:false,color:"#555"},
                {label:"📋 Otros",key:"otr",tipo:"otro",clickable:true,bold:false,color:"#555"},
                {label:"Total Gastos",key:"tGastos",bold:true,color:"#F0057F"},
                null,
                {label:"= UTILIDAD NETA",key:"uNeta",bold:true,isUtil:true,big:true},
              ];
              return(<>
                {/* Year selector */}
                <div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center"}}>
                  <span style={{fontSize:11,color:"#1BB6C8",fontWeight:700}}>📅 AÑO:</span>
                  <select style={{...S.inp,width:100,fontSize:12,padding:"6px 10px"}} value={resAno} onChange={e=>setResAno(e.target.value)}>
                    {ANOS_DISP.map(a=><option key={a} value={a}>{a==="todos"?"Todos":a}</option>)}
                  </select>
                  {canAdmin&&<button onClick={deduplicarGastos} style={{background:"#FFF5E0",color:"#B7570A",border:"1px solid #B7570A",borderRadius:10,padding:"7px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>🧹 Duplicados</button>}
                  <button onClick={()=>{setGastoForm(f=>({...f,fecha:hoyISO()}));setShowGastoModal(true);}} style={{background:"#1BB6C8",color:"#fff",border:"none",borderRadius:10,padding:"7px 14px",fontSize:12,fontWeight:700,cursor:"pointer",marginLeft:"auto"}}>+ Gasto</button>
                </div>
                {/* Monthly table */}
                <div style={{overflowX:"auto",borderRadius:14,boxShadow:"0 2px 12px rgba(0,0,0,0.08)"}}>
                  <table style={{borderCollapse:"collapse",minWidth:900,width:"100%",background:"#fff"}}>
                    <thead>
                      <tr>
                        <th style={{padding:"8px 12px",textAlign:"left",fontSize:11,fontWeight:700,background:"#1A1A1A",color:"#fff",minWidth:160,position:"sticky",left:0}}>CONCEPTO</th>
                        {dm.map(d=>hdrCell(d.mes.toUpperCase(),false))}
                        {hdrCell("TOTAL "+year.toUpperCase(),true)}
                      </tr>
                    </thead>
                    <tbody>
                      {rows.map((row,ri)=>{
                        if(row===null) return(<tr key={ri}><td colSpan={14} style={{height:4,background:"#F5FDFE"}}></td></tr>);
                        const isNeg=row.isUtil&&tot[row.key]<0;
                        const rowBg=row.section==="util"?(tot[row.key]>=0?"#F0FDFA":"#FFF0F8"):ri%2===0?"#FAFAFA":"#fff";
                        const totColor=row.isUtil?(tot[row.key]>=0?"#2D6A4F":"#F0057F"):row.color||"#333";
                        return(<tr key={row.key} style={{background:rowBg}}>
                          <td style={{padding:"7px 12px",fontWeight:row.bold?"700":"400",color:row.color||"#333",fontSize:row.big?13:12,borderLeft:row.isUtil?"3px solid #1BB6C8":"none",position:"sticky",left:0,background:rowBg}}>{row.label}</td>
                          {dm.map(d=>{
                            const v=d[row.key];
                            const c=row.isUtil?(v>=0?"#2D6A4F":"#F0057F"):row.color||"#333";
                            return(<td key={d.mes} style={{padding:"7px 10px",textAlign:"right",fontSize:12,fontWeight:row.bold?"700":"400",color:v===0?"#CCC":c}}>{fv(v)}</td>);
                          })}
                          <td style={{padding:"7px 10px",textAlign:"right",fontWeight:"800",color:totColor,fontSize:row.big?14:12,background:"#E8F9FB"}}>{fv(tot[row.key])}</td>
                        </tr>);
                      })}
                    </tbody>
                  </table>
                </div>
            </>);
          })()}
            </>);
          })()}
        </div>}

      </div>


      {/* MODAL ESTADO IMPORTACIÓN */}
      {showStatusModal&&statusImpId&&(()=>{
        const imp=importaciones.find(i=>i.id===statusImpId);
        if(!imp) return null;
        const est=imp.estado||"ingresada";
        const nxt={"ingresada":"pagada","pagada":"recibida"}[est];
        const isPagada=nxt==="recibida";
        return(<div style={S.ov} onClick={()=>setShowStatusModal(false)}>
          <div style={S.sh} onClick={e=>e.stopPropagation()}>
            <div style={S.shT}>Cambiar estado</div>
            <div style={{textAlign:"center",marginBottom:14}}>
              <div style={{fontSize:14,fontWeight:700,color:"#1A1A1A",marginBottom:4}}>{imp.nombre}</div>
              <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:8,fontSize:12}}>
                <span style={{background:"#FFF5E0",color:"#B7570A",borderRadius:8,padding:"3px 10px",fontWeight:700}}>{est}</span>
                <span>→</span>
                <span style={{background:isPagada?"#E6F4EC":"#E8F9FB",color:isPagada?"#2D6A4F":"#1BB6C8",borderRadius:8,padding:"3px 10px",fontWeight:700}}>{nxt}</span>
              </div>
            </div>
            {nxt==="pagada"&&<div style={{marginBottom:14}}>
              <label style={S.lbl}>TARJETA CON QUE SE PAGÓ</label>
              <select style={S.inp} value={statusTarjetaId} onChange={e=>setStatusTarjetaId(e.target.value)}>
                <option value="">Sin tarjeta / efectivo</option>
                {tarjetas.map(t=><option key={t.id} value={t.id}>{t.nombre} — ${saldoTarjeta(t.id).toFixed(2)}</option>)}
              </select>
              <div style={{fontSize:11,color:"#1BB6C8",marginTop:4}}>Al confirmar se creará un cargo de ${imp.costoTotal.toFixed(2)} en la tarjeta seleccionada</div>
            </div>}
            <button onClick={()=>cambiarEstadoImport(statusImpId,nxt,statusTarjetaId)} style={{...S.btnD,background:nxt==="pagada"?"#F0057F":"#2D6A4F",marginBottom:8}}>
              Confirmar → {nxt}
            </button>
            <button onClick={()=>setShowStatusModal(false)} style={S.cancelBtn}>Cancelar</button>
          </div>
        </div>);
      })()}

      {/* MODAL ESTADO DE CUENTA */}
      {showEstadoCuentaModal&&<div style={S.ov} onClick={()=>setShowEstadoCuentaModal(false)}>
        <div style={{...S.sh,maxHeight:"85vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
          <div style={S.shT}>Cargar Estado de Cuenta</div>
          <div style={{marginBottom:10}}><label style={S.lbl}>TARJETA</label>
            <select style={S.inp} value={ecTarjetaId} onChange={e=>setEcTarjetaId(e.target.value)}>
              <option value="">Selecciona tarjeta...</option>
              {tarjetas.map(t=><option key={t.id} value={t.id}>{t.nombre}</option>)}
            </select>
          </div>
          <div style={{display:"flex",gap:10,marginBottom:10}}>
            <div style={{flex:1}}><label style={S.lbl}>MES</label>
              <select style={S.inp} value={ecMes} onChange={e=>setEcMes(e.target.value)}>
                <option value="">Selecciona...</option>
                {MESES.map(m=><option key={m} value={m}>{m}</option>)}
              </select>
            </div>
            <div style={{flex:1}}><label style={S.lbl}>AÑO</label>
              <input style={S.inp} value={ecAno} onChange={e=>setEcAno(e.target.value)} placeholder="2026"/></div>
          </div>
          <div style={{display:"flex",gap:10,marginBottom:10}}>
            <div style={{flex:1}}><label style={S.lbl}>MONTO TOTAL ($)</label>
              <input type="number" style={S.inp} placeholder="0.00" value={ecMonto} onChange={e=>setEcMonto(e.target.value)}/></div>
            <div style={{flex:1}}><label style={S.lbl}>FECHA MÁX. PAGO</label>
              <input style={S.inp} placeholder="14-Jun-2026" value={ecFechaMax} onChange={e=>setEcFechaMax(e.target.value)}/></div>
          </div>
          <div style={{marginBottom:14}}>
            <label style={S.lbl}>PDF DEL ESTADO DE CUENTA</label>
            <input ref={ecFileRef} type="file" accept="application/pdf,image/*" style={{display:"none"}} onChange={handleEcFile}/>
            <button onClick={()=>ecFileRef.current.click()} style={S.btnComp} disabled={ecUploading}>
              {ecUploading?"⏳ Subiendo a Google Drive...":ecDriveUrl?"✅ Guardado en Drive — toca para reemplazar":ecFilePrev?"📎 Archivo cargado localmente":"📄 Subir PDF o imagen"}
            </button>
            {ecDriveUrl&&<div style={{display:"flex",alignItems:"center",gap:6,marginTop:4}}>
              <span style={{fontSize:11,color:"#2D6A4F",fontWeight:700}}>✓ En Google Drive</span>
              <a href={ecDriveUrl} target="_blank" style={{fontSize:11,color:"#1BB6C8"}}>Ver PDF ↗</a>
            </div>}
            {!ecDriveUrl&&ecFilePrev&&!ecUploading&&<div style={{fontSize:11,color:"#B7570A",marginTop:4}}>⚠ Solo guardado localmente</div>}
          </div>
          <button onClick={guardarEstadoCuenta} disabled={!ecTarjetaId||!ecMonto} style={{...S.btnD,opacity:(!ecTarjetaId||!ecMonto)?0.4:1,marginBottom:8}}>Guardar</button>
          <button onClick={()=>setShowEstadoCuentaModal(false)} style={S.cancelBtn}>Cancelar</button>
        </div>
      </div>}

      {/* MODAL DEUDA MANUAL */}
      {showDeudaModal&&<div style={S.ov} onClick={e=>{if(e.target===e.currentTarget)setShowDeudaModal(false);}}>
        <div style={S.sh}>
          <div style={S.shT}>Registrar Deuda / Venta Anterior</div>
          <div style={{fontSize:11,color:"#AAA",marginBottom:14}}>Para ventas pasadas que no están registradas en ningún live</div>
          <div style={{marginBottom:10}}>
            <label style={S.lbl}>CLIENTE</label>
            <input style={S.inp} placeholder="Alias del cliente (ej: MARIA)" value={deudaForm.cliente}
              onChange={e=>setDeudaForm(f=>({...f,cliente:e.target.value}))} autoCapitalize="characters"/>
            {deudaForm.cliente.length>0&&allAliases.filter(a=>a&&a.includes(deudaForm.cliente.toUpperCase())).slice(0,4).map(a=>(
              <button key={a} onClick={()=>setDeudaForm(f=>({...f,cliente:a}))} style={S.sugI}>{a}</button>
            ))}
          </div>
          <div style={{marginBottom:10}}>
            <label style={S.lbl}>LIVE / ORIGEN <span style={{fontWeight:400,color:"#AAA"}}>(opcional)</span></label>
            <input style={S.inp} placeholder="Ej: Live 3 - Mar/26, WhatsApp, Pedido directo..." value={deudaForm.live}
              onChange={e=>setDeudaForm(f=>({...f,live:e.target.value}))}/>
            {allLivesAll.length>0&&<div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:4}}>
              {allLivesAll.slice(0,6).map(l=><button key={l} onClick={()=>setDeudaForm(f=>({...f,live:l}))} style={{background:deudaForm.live===l?"#1BB6C8":"#F0FBFD",color:deudaForm.live===l?"#fff":"#1BB6C8",border:"1px solid #1BB6C8",borderRadius:8,padding:"3px 10px",fontSize:11,cursor:"pointer"}}>{l}</button>)}
            </div>}
          </div>
          <div style={{marginBottom:10}}>
            <label style={S.lbl}>DESCRIPCIÓN <span style={{fontWeight:400,color:"#AAA"}}>(opcional)</span></label>
            <input style={S.inp} placeholder="Ej: Blusa niña T-S, Zapatos T-34..." value={deudaForm.descripcion}
              onChange={e=>setDeudaForm(f=>({...f,descripcion:e.target.value}))}/>
          </div>
          <div style={{display:"flex",gap:10,marginBottom:14}}>
            <div style={{flex:1}}>
              <label style={S.lbl}>MONTO ($)</label>
              <input type="number" style={S.inp} placeholder="0.00" value={deudaForm.monto}
                onChange={e=>setDeudaForm(f=>({...f,monto:e.target.value}))}/>
            </div>
            <div style={{flex:1}}>
              <label style={S.lbl}>FECHA <span style={{fontWeight:400,color:"#AAA"}}>(opcional)</span></label>
              <input type="date" style={S.inp} value={deudaForm.fecha||hoyISO()}
                onChange={e=>setDeudaForm(f=>({...f,fecha:e.target.value}))}/>
            </div>
          </div>
          <button onClick={guardarDeudaManual} style={{...S.btnP,width:"100%",padding:"12px",fontSize:14}}>
            ✓ Registrar Deuda ${deudaForm.monto?parseFloat(deudaForm.monto||0).toFixed(2):"0.00"}
          </button>
        </div>
      </div>}
      {/* MODAL GASTO */}
      {showGastoModal&&<div style={S.ov} onClick={()=>setShowGastoModal(false)}>
        <div style={S.sh} onClick={e=>e.stopPropagation()}>
          <div style={S.shT}>Registrar Gasto</div>
          <div style={{marginBottom:10}}><label style={S.lbl}>TIPO</label>
            <select style={S.inp} value={gastoForm.tipo} onChange={e=>setGastoForm(f=>({...f,tipo:e.target.value,tarjetaId:""}))}>
              <option value="servientrega">🚚 Servientrega</option>
              <option value="isd">🏦 Impuesto Salida Divisas</option>
              <option value="interes">💳 Intereses Tarjeta</option>
              <option value="suministros">🖨 Suministros (rollos, empaques...)</option>
              <option value="otro">📋 Otro gasto</option>
            </select>
          </div>
          {gastoForm.tipo==="servientrega"&&<div style={{marginBottom:10}}>
            <label style={S.lbl}>CARGAR XMLs DEL SRI (uno o varios)</label>
            <input ref={xmlSrvRef} type="file" accept="text/xml,application/xml,.xml,*/*" multiple style={{display:"none"}} onChange={e=>procesarXMLServientrega(e.target.files)}/>
            <button onClick={()=>xmlSrvRef.current.click()} style={{...S.btnComp,marginBottom:4}}>📂 Cargar XMLs Servientrega</button>
            <div style={{fontSize:10,color:"#AAA"}}>Se sumará el importeTotal de cada XML · En iPhone: toca el archivo, luego "Seleccionar" y elige varios desde la app Archivos</div>
          </div>}
          {gastoForm.tipo==="interes"&&tarjetas.length>0&&<div style={{marginBottom:10}}>
            <label style={S.lbl}>TARJETA</label>
            <select style={S.inp} value={gastoForm.tarjetaId} onChange={e=>setGastoForm(f=>({...f,tarjetaId:e.target.value}))}>
              <option value="">Sin tarjeta específica</option>
              {tarjetas.map(t=><option key={t.id} value={t.id}>{t.nombre}</option>)}
            </select>
          </div>}
          {gastoForm.tipo==="isd"&&tarjetas.length>0&&<div style={{marginBottom:10}}>
            <label style={S.lbl}>TARJETA RELACIONADA</label>
            <select style={S.inp} value={gastoForm.tarjetaId} onChange={e=>setGastoForm(f=>({...f,tarjetaId:e.target.value}))}>
              <option value="">Sin tarjeta específica</option>
              {tarjetas.map(t=><option key={t.id} value={t.id}>{t.nombre}</option>)}
            </select>
          </div>}
          <div style={{marginBottom:10}}><label style={S.lbl}>DESCRIPCIÓN</label>
            <input style={S.inp} placeholder="Detalle del gasto..." value={gastoForm.descripcion} onChange={e=>setGastoForm(f=>({...f,descripcion:e.target.value}))}/></div>
          <div style={{display:"flex",gap:10,marginBottom:14}}>
            <div style={{flex:1}}><label style={S.lbl}>MONTO ($)</label>
              <input type="number" style={S.inp} placeholder="0.00" value={gastoForm.monto} onChange={e=>setGastoForm(f=>({...f,monto:e.target.value}))}/></div>
            <div style={{flex:1}}><label style={S.lbl}>FECHA</label>
              <input style={S.inp} type="date" value={gastoForm.fecha||hoyISO()} onChange={e=>setGastoForm(f=>({...f,fecha:e.target.value}))}/></div>
          </div>
          <button onClick={guardarGasto} disabled={!gastoForm.monto} style={{...S.btnD,opacity:!gastoForm.monto?0.4:1,marginBottom:8}}>Registrar Gasto</button>
          <button onClick={()=>setShowGastoModal(false)} style={S.cancelBtn}>Cancelar</button>
        </div>
      </div>}

      {/* BOTTOM NAV */}
      <div id="app-bnav" style={S.bnav}>
        {[{id:"pedido",icon:"🛍",l:"Pedido"},{id:"pago",icon:"💵",l:"Pago"},{id:"inventario",icon:"📦",l:"Stock"},{id:"clientes",icon:"👥",l:"Clientes"},{id:"saldos",icon:"📋",l:"Saldos"},...(canFinanciero?[{id:"financiero",icon:"📊",l:"Finanzas"}]:[])].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{...S.navI,color:tab===t.id?"#F0057F":"#CCC"}}>
            <span style={{fontSize:24}}>{t.icon}</span>
            <span style={{fontSize:isDesk?13:11,fontWeight:tab===t.id?700:500,marginTop:isDesk?0:2}}>{t.l}</span>
            {tab===t.id&&<div className="nav-dot" style={S.navDot}/>}
          </button>
        ))}
      </div>
    </div>
  );
}

const st={

function Root() {
  const [authed, setAuthed] = React.useState(!!getSesion());

  if (!authed) return <LoginScreen onLogin={(u)=>{setAuthed(true);setCurrentUser(u);}}/>;
  return <App onLogout={cerrarSesion} currentUser={currentUser}/>;
}
